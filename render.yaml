services:
  - type: web
    name: elyth-pos-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: true
      - key: SANDBOX_DB_HOST
        sync: false
      - key: SANDBOX_DB_PORT
        value: 5432
      - key: SANDBOX_DB_NAME
        sync: false
      - key: SANDBOX_DB_USER
        sync: false
      - key: SANDBOX_DB_PASSWORD
        sync: false
      - key: SANDBOX_DB_SSL
        value: true
